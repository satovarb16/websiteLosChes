<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none" role="img" aria-label="Los Ches Grill &amp; Meals">
  <!-- Badge background -->
  <circle cx="80" cy="80" r="78" fill="#2c2924"/>
  <circle cx="80" cy="80" r="75" fill="none" stroke="#5a4e3a" stroke-width="1.5"/>

  <!-- GRILL | MEALS -->
  <text x="80" y="39"
        font-family="'Hanken Grotesk', system-ui, sans-serif"
        font-size="9" font-weight="600" fill="#c0a878"
        text-anchor="middle" letter-spacing="2">GRILL  |  MEALS</text>

  <!-- Flame: outer -->
  <path d="M80 44 C75 53 65 61 65 73 C65 85 72 92 80 92 C88 92 95 85 95 73 C95 61 85 53 80 44Z"
        fill="#cc4400"/>
  <!-- Flame: mid -->
  <path d="M80 52 C76 59 70 65 70 73 C70 82 74 88 80 88 C86 88 90 82 90 73 C90 65 84 59 80 52Z"
        fill="#f5a200"/>
  <!-- Flame: inner highlight -->
  <path d="M80 61 C78 65 75 68 75 73 C75 78 77 82 80 82 C83 82 85 78 85 73 C85 68 82 65 80 61Z"
        fill="#ffe6b0"/>

  <!-- Grill fork (left — tines point upper-right, handle lower-left) -->
  <g transform="translate(53,88) rotate(-38)">
    <rect x="-6.5" y="-38" width="4" height="25" rx="2" fill="#c8b490"/>
    <rect x="2.5"  y="-38" width="4" height="25" rx="2" fill="#c8b490"/>
    <rect x="-9"   y="-15" width="18" height="5" rx="2.5" fill="#c8b490"/>
    <rect x="-3.5" y="-11" width="7" height="38" rx="3.5" fill="#c8b490"/>
  </g>

  <!-- Cleaver (right — blade upper-left, handle lower-right) -->
  <g transform="translate(107,88) rotate(38)">
    <path d="M-14 -46 L10 -46 L10 -18 L-14 -23 Z" fill="#c8b490"/>
    <rect x="-14" y="-46" width="5" height="28" rx="0" fill="#a89060"/>
    <line x1="10" y1="-46" x2="10" y2="-18" stroke="#deccaa" stroke-width="1.2"/>
    <rect x="-4" y="-18" width="12" height="32" rx="6" fill="#c8b490"/>
  </g>

  <!-- LOS CHES -->
  <text x="80" y="126"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="700" fill="#f0ece4"
        text-anchor="middle" letter-spacing="3">LOS CHES</text>

  <!-- Accent line -->
  <line x1="26" y1="134" x2="134" y2="134" stroke="#5a4e3a" stroke-width="0.8"/>
</svg>
